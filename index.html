<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC Tools Bro</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
        body {background: #121212; color: white; padding: 2rem; max-width: 1200px; margin: 0 auto;}
        h1 {color: #4ade80; margin-bottom: 2rem;}
        .tool-card {background: #1e1e1e; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;}
        .tool-card h2 {margin-bottom: 1rem; color: #60a5fa;}
        input, button {padding: 0.5rem; margin: 0.5rem 0; border: none; border-radius: 4px;}
        button {background: #2563eb; color: white; cursor: pointer;}
    </style>
</head>
<body>
    <h1>🔌 PLC Tools Bro</h1>

    <!-- Fitur pertama: Konverter Bilangan (paling gampang dan sering dipakai) -->
    <div class="tool-card">
        <h2>Konverter Bilangan</h2>
        <input type="text" id="decimalInput" placeholder="Masukkan desimal">
        <button onclick="convertNumber()">Konversi</button>
        <div id="convertResult"></div>
    </div>

    <script>
        function convertNumber() {
            const dec = document.getElementById('decimalInput').value;
            if(!dec) return alert("Masukkan angka dulu bro!");
            const biner = parseInt(dec).toString(2);
            const hex = parseInt(dec).toString(16).toUpperCase();
            document.getElementById('convertResult').innerHTML = `Biner: ${biner} <br> Hex: ${hex}`;
        }
    </script>
</body>
</html>
