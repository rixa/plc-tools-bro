<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC Tools Bro</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
        body {background: #121212; color: white; padding: 2rem; max-width: 1200px; margin: 0 auto;}
        h1 {color: #4ade80; margin-bottom: 2rem;}
        .tool-card {background: #1e1e1e; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;}
        .tool-card h2 {margin-bottom: 1rem; color: #60a5fa;}
        input, button {padding: 0.5rem; margin: 0.5rem 0; border: none; border-radius: 4px;}
        button {background: #2563eb; color: white; cursor: pointer;}
    </style>
</head>
<body>
    <h1>🔌 PLC Tools Bro</h1>

    <!-- Fitur pertama: Konverter Bilangan (paling gampang dan sering dipakai) -->
    <div class="tool-card">
        <h2>Konverter Bilangan</h2>
        <input type="text" id="decimalInput" placeholder="Masukkan desimal">
        <button onclick="convertNumber()">Konversi</button>
        <div id="convertResult"></div>
    </div>

    <script>
        function convertNumber() {
            const dec = document.getElementById('decimalInput').value;
            if(!dec) return alert("Masukkan angka dulu bro!");
            const biner = parseInt(dec).toString(2);
            const hex = parseInt(dec).toString(16).toUpperCase();
            document.getElementById('convertResult').innerHTML = `Biner: ${biner} <br> Hex: ${hex}`;
        }
    </script>
</body>
</html>
<!-- Fitur Kedua: Kalkulator Kode Warna Resistor 4 Band -->
<div class="tool-card">
    <h2>Kalkulator Resistor</h2>
    <select id="band1"></select>
    <select id="band2"></select>
    <select id="band3"></select>
    <select id="tolerance"></select>
    <button onclick="calcResistor()">Hitung Nilai</button>
    <div id="resistorResult"></div>
    <script>
        // Daftar warna resistor
        const colors = ["Hitam", "Coklat", "Merah", "Oranye", "Kuning", "Hijau", "Biru", "Ungu", "Abu-abu", "Putih"];
        const band1 = document.getElementById("band1"), band2 = document.getElementById("band2"), band3 = document.getElementById("band3");
        // Isi dropdown warna
        colors.forEach((c,i) => {
            band1.add(new Option(c,i)); band2.add(new Option(c,i)); band3.add(new Option(c,i));
        });
        document.getElementById("tolerance").add(new Option("±5% (Emas)","0.05"));

        function calcResistor() {
            const v1 = parseInt(band1.value), v2 = parseInt(band2.value), mul = parseInt(band3.value);
            const tol = parseFloat(document.getElementById("tolerance").value);
            const nilai = (v1*10 + v2) * (10**mul);
            document.getElementById("resistorResult").innerHTML = `Nilai Resistor: ${nilai >= 1000 ? nilai/1000 + " kΩ" : nilai + " Ω"} <br> Toleransi: ${tol*100}%`;
        }
    </script>
</div>
